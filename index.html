<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>我的视频集</title>
        <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        font-size: 16px;
    }

    /* 橙红色中国风主背景：暖橙红渐变+国风纹理 */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
        background: linear-gradient(135deg, #f86b3f, #f03800);
        background-attachment: fixed;
        color: #fff;
        line-height: 1.6;
        position: relative;
    }

    /* 橙红色中国风纹理遮罩（祥云/纹绣质感） */
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("http://gd-hbimg.huaban.com/c6d50c0ff5e9f250d2f67284dfc2bff271baaea514560-gJOX6S");
        background-size: cover;
        opacity: 0.12;
        z-index: -1;
    }

    header {
        text-align: center;
        padding: 3rem 1rem;
        background: linear-gradient(135deg, #e6391a, #c72c10);
        color: #fff;
        border-bottom: 2px solid #ffd700;
    }

    header h1 {
        font-size: 2.2rem;
        margin-bottom: 0.5rem;
        font-weight: 700;
        letter-spacing: 2px;
    }

    header p {
        color: rgba(255,255,255,0.9);
        font-size: 1rem;
        letter-spacing: 1px;
    }

    .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 1rem;
    }

    .video-card, .download-card {
        border-radius: 16px;
        overflow: hidden;
        margin-bottom: 2rem;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    .video-card {
        background: #fff;
        border: 1px solid #ffb84d;
    }

    .video-container {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
    }

    .video-container video,
    .video-container iframe {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        object-fit: cover;
    }

    .video-cover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url(cover2.jpg) center/cover;
        cursor: pointer;
        z-index: 5;
    }

    .play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        background: rgba(230,57,26,0.3);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
        border: 2px solid #fff;
    }
    .play-btn::after {
        content: "";
        width: 0;
        height: 0;
        margin-left: 6px;
        border-top: 16px solid transparent;
        border-bottom: 16px solid transparent;
        border-left: 26px solid #fff;
    }

    .fullscreen-btn {
        position: absolute;
        bottom: 12px;
        right: 12px;
        background: rgba(230,57,26,0.8);
        color: #fff;
        border: 1px solid #ffd700;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        z-index: 10;
    }

    .fullscreen-btn:hover {
        background: rgba(199,44,16,1);
    }

    /* 橙红色中国风下载卡片背景 */
    .download-card {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        background: url("https://picsum.photos/id/116/2000/2000") center/cover;
        overflow: hidden;
        border: 1px solid #ffd700;
    }

    .download-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(230,57,26,0.4);
        z-index: 0;
    }

    .download-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        padding: 0 1rem;
        text-align: center;
        z-index: 1;
    }

    .download-card h2 {
        font-size: 1.75rem;
        color: #ffd700;
        margin-bottom: 1rem;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
        letter-spacing: 2px;
    }

    .download-card p {
        font-size: 1.5rem;
        color: #fff;
        margin-bottom: 1.5rem;
        text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    .download-btn {
        display: inline-block;
        padding: 24px 36px;
        background: linear-gradient(135deg, #e6391a, #c72c10);
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-size: 1.1rem;
        transition: 0.3s;
        border: 1px solid #ffd700;
        letter-spacing: 1px;
    }

    .download-btn:hover {
        background: linear-gradient(135deg, #c72c10, #a8220c);
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    footer {
        text-align: center;
        padding: 2rem 1rem;
        color: rgba(255,255,255,0.8);
        font-size: 0.9rem;
        letter-spacing: 1px;
    }
        </style>
    </head>
    <body>
        <header>
            <h1>我的视频集</h1>
            <p>生活片段 · 美好记录</p>
        </header>
        <div class="container">
            <div class="video-card">
                <div class="video-container">
                    <video id="v1" controls playsinline allowfullscreen poster="cover1.jpg">
                        <source src="你咋那么美.m3u8" type="video/mp4"> 您的浏览器不支持播放视频
                    </video> <button class="fullscreen-btn" onclick="goFull('v1')">全屏</button>
                </div>
            </div>
            <div class="download-card">
                <div class="download-content">
                    <h2>遇岩同乐 App</h2>
                    <p>内置大图标，适配手机端，点击下方按钮下载安装</p> <a class="download-btn" href="https://gitee.com/x21y/an/releases/download/YaX5.1.9手机/YaX_5.1.9.apk" download> 下载遇岩同乐 v5.1.9 </a>
                </div>
            </div>
        </div>
        <footer>
            © 2026 我的视频站
        </footer>
        <script>
    function goFull(id) {
        const v = document.getElementById(id);
        if (v.requestFullscreen) v.requestFullscreen();
        else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
        else if (v.msRequestFullscreen) v.msRequestFullscreen();
    }

    function playBilibili(cover) {
        const iframe = document.getElementById('bili-iframe');
        iframe.src = iframe.src.replace('&autoplay=0', '&autoplay=1');
        cover.style.display = 'none';
    }
        </script>
    </body>
</html>
